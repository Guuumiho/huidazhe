<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>回答者</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="top-left-tools">
        <span id="config-status" class="status-pill">未配置 API</span>
        <button id="toggle-settings" class="ghost-button" type="button">设置</button>
      </div>

      <section id="settings-panel" class="settings-panel hidden">
        <div class="settings-header">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>接口配置</h2>
          </div>
          <button id="save-settings" class="ghost-button" type="button">保存配置</button>
        </div>

        <div class="settings-grid">
          <label class="field settings-span-2">
            <span>API URL</span>
            <input id="api-url" type="text" placeholder="https://api.openai.com/v1" />
            <small class="field-hint">
              可填写 `https://api.openai.com/v1`、`.../chat/completions` 或 `.../responses`
            </small>
          </label>
          <label class="field">
            <span>Model</span>
            <input id="model" type="text" placeholder="gpt-4.1-mini" />
          </label>
          <label class="field settings-span-3">
            <span>API Key</span>
            <input id="api-key" type="password" placeholder="sk-..." />
          </label>
        </div>
      </section>

      <main class="chat-card">
        <div id="empty-state" class="empty-state">
          先在设置里填好 `API URL` 和 `API Key`，然后就可以开始提问。
        </div>
        <div id="chat-list" class="chat-list"></div>
      </main>

      <form id="ask-form" class="composer">
        <label class="field composer-field">
          <span>输入问题</span>
          <textarea
            id="question-input"
            rows="4"
            placeholder="输入一个不会污染主工作流上下文的小问题..."
          ></textarea>
        </label>
        <div class="composer-actions">
          <div id="form-message" class="form-message"></div>
          <button id="ask-button" class="primary-button" type="submit">发送</button>
        </div>
      </form>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
